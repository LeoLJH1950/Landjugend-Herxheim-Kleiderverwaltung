<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Landjugend Herxheim – Kleiderverwaltung</title>

<style>
:root {
    --blau:#0077cc;
    --gruen:#3cb043;
    --rot:#dc3545;
    --hellgrau:#f5f5f5;
}

body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: var(--hellgrau);
}

/* Passwort */
#passwortOverlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#passwortBox {
    background: white;
    padding: 25px;
    border-radius: 10px;
    width: 90%;
    max-width: 350px;
    text-align: center;
}

header {
    background: linear-gradient(90deg, var(--blau), var(--gruen));
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    max-width: 900px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

h2 {
    border-left: 6px solid var(--gruen);
    padding-left: 10px;
}

form {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

input, select {
    padding: 6px;
}

button.primary { background: var(--blau); color: white; }
button.secondary { background: var(--gruen); color: white; }
button.danger { background: var(--rot); color: white; }
button.small { font-size: 12px; padding: 4px 6px; }

.gruppe {
    background:#e9f5ff;
    padding:12px;
    margin-top:10px;
    cursor:pointer;
    font-weight:bold;
}

.untergruppe {
    display:none;
    margin-left:15px;
}

table {
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th {
    background:var(--blau);
    color:white;
}

td {
    border:1px solid #ddd;
    padding:6px;
}

.low-stock {
    background:#fff3cd;
}

#popup {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

#popupContent {
    background:white;
    padding:20px;
    border-radius:8px;
}
</style>
</head>

<body>

<!-- PASSWORT -->
<div id="passwortOverlay">
    <div id="passwortBox">
        <h2>Passwort</h2>
        <input type="password" id="pwInput">
        <button onclick="checkPasswort()">Weiter</button>
    </div>
</div>

<script>
const PASSWORT="LJH1950";
function checkPasswort(){
    if(document.getElementById("pwInput").value===PASSWORT){
        document.getElementById("passwortOverlay").style.display="none";
    }
}
</script>

<header>
<h1>Kleiderverwaltung</h1>
</header>

<div class="container">

<h2>Neuen Artikel hinzufügen</h2>

<form id="addForm">
    <input id="name" placeholder="Artikelname">
    <select id="kategorie">
        <option>Damen</option>
        <option>Herren</option>
        <option>Unisex</option>
        <option>Kinder</option>
    </select>
    <input id="groesse" placeholder="Größe">
    <input id="bestand" type="number" placeholder="Bestand">
    <button class="primary" type="submit">Hinzufügen</button>
</form>

<h2>Bestand</h2>
<div id="gruppenContainer"></div>

<h2>Offene Zahlungen</h2>
<div id="offeneListe"></div>

<button id="resetAll" class="danger">Alles löschen</button>

</div>

<!-- POPUP -->
<div id="popup">
<div id="popupContent">
    <h3>Offene Zahlung</h3>
    <input id="popupName" placeholder="Name">
    <input id="popupBetrag" placeholder="Betrag">
    <button id="popupSave" class="primary">Speichern</button>
    <button id="popupCancel" class="secondary">Abbrechen</button>
</div>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
updateDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCD0Pz2LpOdFQ6-UrlNCuHQ5sqW87SgsDs",
authDomain:"ljh-kleider.firebaseapp.com",
projectId:"ljh-kleider",
storageBucket:"ljh-kleider.firebasestorage.app",
messagingSenderId:"76446271591",
appId:"1:76446271591:web:ecd096fa6c9afa570fecc2"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let artikelListe=[];
let offeneZahlungen=[];
let aktuelleID=null;

// ================= LOAD =================
async function load(){

artikelListe=[];
offeneZahlungen=[];

const a=await getDocs(collection(db,"artikel"));
a.forEach(d=>artikelListe.push({id:d.id,...d.data()}));

const o=await getDocs(collection(db,"offene"));
o.forEach(d=>offeneZahlungen.push({id:d.id,...d.data()}));

render();
renderOffene();
}

// ================= ADD =================
async function addArtikel(){

const name=nameEl.value.trim();
const kategorie=kategorieEl.value;
const groesse=groesseEl.value.trim();
const bestand=Number(bestandEl.value);

if(!name||!groesse||isNaN(bestand)) return;

await addDoc(collection(db,"artikel"),{
name,kategorie,groesse,bestand
});

addForm.reset();
load();
}

// ================= GROUP =================
function group(){

const g={};

artikelListe.forEach(a=>{
const key=a.name+"___"+a.kategorie;
if(!g[key])g[key]=[];
g[key].push(a);
});

return g;
}

// ================= RENDER =================
function render(){

const c=document.getElementById("gruppenContainer");
c.innerHTML="";

const groups=group();

Object.keys(groups).forEach(key=>{

const[name,kat]=key.split("___");

const box=document.createElement("div");
box.className="gruppe";
box.innerHTML=`${name} (${kat})`;

const inner=document.createElement("div");
inner.className="untergruppe";
inner.style.display="block";

groups[key].forEach(a=>{

const div=document.createElement("div");

div.innerHTML=`
Größe <b>${a.groesse}</b> |
Bestand <b>${a.bestand}</b>

<button onclick="plus('${a.id}')">+1</button>
<button onclick="minus('${a.id}')">-1</button>
<button onclick="del('${a.id}')">Löschen</button>
<hr>
`;

inner.appendChild(div);
});

box.appendChild(inner);
c.appendChild(box);
});
}

// ================= OFFENE =================
function renderOffene(){

const c=document.getElementById("offeneListe");
c.innerHTML="";

offeneZahlungen.forEach(o=>{

const div=document.createElement("div");

div.innerHTML=`
<b>${o.name}</b> - ${o.artikel} (${o.groesse})<br>
${o.betrag} €
`;

c.appendChild(div);
});
}

// ================= ACTIONS =================
window.plus=async id=>{

const a=artikelListe.find(x=>x.id===id);

await updateDoc(doc(db,"artikel",id),{
bestand:a.bestand+1
});

load();
};

window.minus=async id=>{

const a=artikelListe.find(x=>x.id===id);

aktuelleID=id;

document.getElementById("popup").style.display="flex";
};

popupSave.onclick=async()=>{

const a=artikelListe.find(x=>x.id===aktuelleID);

await updateDoc(doc(db,"artikel",aktuelleID),{
bestand:a.bestand-1
});

await addDoc(collection(db,"offene"),{
name:popupName.value,
betrag:popupBetrag.value,
artikel:a.name,
groesse:a.groesse
});

popupName.value="";
popupBetrag.value="";
popup.style.display="none";

load();
};

popupCancel.onclick=()=>popup.style.display="none";

window.del=async id=>{

await deleteDoc(doc(db,"artikel",id));
load();
};

// ================= FORM =================
const addForm=document.getElementById("addForm");
const nameEl=document.getElementById("name");
const kategorieEl=document.getElementById("kategorie");
const groesseEl=document.getElementById("groesse");
const bestandEl=document.getElementById("bestand");

addForm.addEventListener("submit",e=>{
e.preventDefault();
addArtikel();
});

// ================= RESET =================
resetAll.onclick=async()=>{

const a=await getDocs(collection(db,"artikel"));
a.forEach(d=>deleteDoc(doc(db,"artikel",d.id)));

const o=await getDocs(collection(db,"offene"));
o.forEach(d=>deleteDoc(doc(db,"offene",d.id)));

load();
};

load();

</script>

</body>
</html>
