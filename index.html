<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Kleiderverwaltung LJH</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
header {background:linear-gradient(90deg,#0077cc,#3cb043); color:white; padding:20px; text-align:center;}

.container {max-width:900px; margin:20px auto; background:white; padding:20px; border-radius:10px;}

form {display:grid; grid-template-columns:repeat(4,1fr); gap:10px;}
input,select {padding:6px;}

button {padding:6px 10px; border:none; cursor:pointer;}
.primary {background:#0077cc; color:white;}
.secondary {background:#3cb043; color:white;}
.danger {background:#dc3545; color:white;}

.group {background:#e9f5ff; margin-top:10px; padding:10px; border-radius:6px;}
.sub {margin-left:15px;}

.item {background:white; border:1px solid #ddd; margin-top:5px; padding:6px;}

#popup,#payPopup{
position:fixed; top:0; left:0; width:100%; height:100%;
background:rgba(0,0,0,0.5);
display:none; justify-content:center; align-items:center;
}

.box {background:white; padding:20px; border-radius:8px; width:300px;}
</style>
</head>

<body>

<!-- PASSWORT -->
<div id="lock">
<div class="box">
<h2>Passwort</h2>
<input id="pw" type="password">
<button onclick="check()">Enter</button>
<p id="err" style="color:red; display:none;">Falsch</p>
</div>
</div>

<header>
<h1>Kleiderverwaltung</h1>
</header>

<div class="container">

<h2>Artikel hinzufügen</h2>
<form id="form">
<input id="name" placeholder="Artikel (z.B. Hose)">
<select id="kat">
<option>Damen</option>
<option>Herren</option>
</select>
<input id="size" placeholder="Größe (S/M/L)">
<input id="count" type="number" placeholder="Bestand">
<button class="primary">Hinzufügen</button>
</form>

<h2>Bestand</h2>
<div id="list"></div>

<h2>Offene Rechnungen</h2>
<div id="open"></div>

</div>

<!-- PAYMENT POPUP -->
<div id="payPopup">
<div class="box">
<h3>Verkauf erfassen</h3>

<p>Bezahlt direkt?</p>
<button onclick="directPay(true)">Ja</button>
<button onclick="directPay(false)">Nein</button>

<div id="details" style="display:none;">
<input id="buyer" placeholder="Name">
<input id="amount" placeholder="Betrag">
<button onclick="saveDebt()">Speichern</button>
</div>

<button onclick="closePay()">Abbrechen</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
updateDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCD0Pz2LpOdFQ6-UrlNCuHQ5sqW87SgsDs",
authDomain:"ljh-kleider.firebaseapp.com",
projectId:"ljh-kleider",
storageBucket:"ljh-kleider.firebasestorage.app",
messagingSenderId:"76446271591",
appId:"1:76446271591:web:ecd096fa6c9afa570fecc2"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let data=[];
let open=[];
let current=null;
let direct=false;

/* ================= LOGIN ================= */
window.check=()=>{
if(document.getElementById("pw").value==="LJH1950"){
document.getElementById("lock").style.display="none";
load();
}else{
document.getElementById("err").style.display="block";
}
};

/* ================= LOAD ================= */
async function load(){

data=[];
open=[];

const a=await getDocs(collection(db,"artikel"));
a.forEach(d=>data.push({id:d.id,...d.data()}));

const o=await getDocs(collection(db,"offene"));
o.forEach(d=>open.push({id:d.id,...d.data()}));

render();
renderOpen();
}

/* ================= ADD ================= */
document.getElementById("form").addEventListener("submit",async e=>{
e.preventDefault();

await addDoc(collection(db,"artikel"),{
name:form.name.value,
kat:form.kat.value,
size:form.size.value,
count:Number(form.count.value)
});

form.reset();
load();
});

/* ================= GROUP ================= */
function group(){

const g={};

data.forEach(a=>{
const k=a.name+"___"+a.kat;
if(!g[k])g[k]=[];
g[k].push(a);
});

return g;
}

/* ================= RENDER ================= */
function render(){

const c=document.getElementById("list");
c.innerHTML="";

const groups=group();

Object.keys(groups).forEach(k=>{

const[name,kat]=k.split("___");

const box=document.createElement("div");
box.className="group";
box.innerHTML=`${name} (${kat})`;

groups[k].forEach(a=>{

const d=document.createElement("div");
d.className="item";

d.innerHTML=`
Größe: <b>${a.size}</b> | Bestand: <b>${a.count}</b>
<button onclick="plus('${a.id}')">+1</button>
<button onclick="minus('${a.id}')">-1</button>
`;

box.appendChild(d);
});

c.appendChild(box);
});
}

/* ================= PLUS ================= */
window.plus=async id=>{

const a=data.find(x=>x.id===id);

await updateDoc(doc(db,"artikel",id),{
count:a.count+1
});

load();
};

/* ================= MINUS ================= */
window.minus=id=>{
current=id;
direct=false;
document.getElementById("payPopup").style.display="flex";
document.getElementById("details").style.display="none";
};

/* ================= PAYMENT ================= */
window.directPay=(yes)=>{
direct=yes;
if(yes){
finishSale();
}else{
document.getElementById("details").style.display="block";
}
};

window.saveDebt=async()=>{

const a=data.find(x=>x.id===current);

await addDoc(collection(db,"offene"),{
name:buyer.value,
betrag:amount.value,
artikel:a.name,
size:a.size
});

finishSale();
};

async function finishSale(){

const a=data.find(x=>x.id===current);

await updateDoc(doc(db,"artikel",current),{
count:a.count-1
});

closePay();
load();
}

/* ================= OPEN ================= */
function renderOpen(){

const c=document.getElementById("open");
c.innerHTML="";

open.forEach(o=>{

const d=document.createElement("div");
d.className="item";

d.innerHTML=`
<b>${o.name}</b> - ${o.artikel} (${o.size})<br>
${o.betrag} €<br>
<button class="secondary" onclick="markPaid('${o.id}')">Bezahlt</button>
`;

c.appendChild(d);
});
}

/* ================= MARK PAID (NEU) ================= */
window.markPaid=async(id)=>{

await deleteDoc(doc(db,"offene",id));

load();
};

window.closePay=()=>{
document.getElementById("payPopup").style.display="none";
};

load();

</script>

</body>
</html>
