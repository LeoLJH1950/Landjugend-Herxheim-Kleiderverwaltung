<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Kleiderverwaltung</title>

<style>
:root {
    --blau:#0077cc;
    --gruen:#3cb043;
    --rot:#dc3545;
    --hell:#f5f5f5;
}

body {
    font-family: Arial;
    margin: 0;
    background: var(--hell);
}

header {
    background: linear-gradient(90deg,var(--blau),var(--gruen));
    color:white;
    padding:20px;
    text-align:center;
}

.container {
    max-width:900px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

form {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

input,select {
    padding:6px;
}

button {
    padding:7px 12px;
    border:none;
    cursor:pointer;
}

.primary { background:var(--blau); color:white; }
.secondary { background:var(--gruen); color:white; }
.danger { background:var(--rot); color:white; }

.gruppe {
    background:#e9f5ff;
    padding:10px;
    margin-top:10px;
    font-weight:bold;
}

.unter {
    margin-left:15px;
    display:none;
}

table {
    width:100%;
    margin-top:10px;
    border-collapse:collapse;
}

th {
    background:var(--blau);
    color:white;
}

td {
    border:1px solid #ddd;
    padding:6px;
}

.low {
    background:#fff3cd;
}

#popup {
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    justify-content:center;
    align-items:center;
}

#popupBox {
    background:white;
    padding:20px;
}
</style>
</head>

<body>

<header>
<h1>Kleiderverwaltung</h1>
</header>

<div class="container">

<h2>Artikel hinzufügen</h2>

<form id="addForm">
    <input id="name" placeholder="Name">
    <select id="kategorie">
        <option>Damen</option>
        <option>Herren</option>
        <option>Unisex</option>
        <option>Kinder</option>
    </select>
    <input id="groesse" placeholder="Größe">
    <input id="bestand" type="number" placeholder="Bestand">
    <button class="primary">Hinzufügen</button>
</form>

<h2>Bestand</h2>
<div id="gruppenContainer"></div>

<h2>Offene Zahlungen</h2>
<div id="offeneListe"></div>

<button id="reset" class="danger">Alles löschen</button>

</div>

<!-- POPUP -->
<div id="popup">
<div id="popupBox">
    <input id="popupName" placeholder="Name">
    <input id="popupBetrag" placeholder="Betrag">
    <button id="savePay" class="primary">Speichern</button>
    <button onclick="closePopup()" class="secondary">Abbrechen</button>
</div>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    updateDoc,
    deleteDoc,
    doc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCD0Pz2LpOdFQ6-UrlNCuHQ5sqW87SgsDs",
    authDomain: "ljh-kleider.firebaseapp.com",
    projectId: "ljh-kleider",
    storageBucket: "ljh-kleider.firebasestorage.app",
    messagingSenderId: "76446271591",
    appId: "1:76446271591:web:ecd096fa6c9afa570fecc2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let artikelListe = [];
let offeneListe = [];
let selectedId = null;

// ================= LOAD =================
async function load() {

    artikelListe = [];
    offeneListe = [];

    const a = await getDocs(collection(db,"artikel"));
    a.forEach(d => artikelListe.push({id:d.id,...d.data()}));

    const o = await getDocs(collection(db,"offene"));
    o.forEach(d => offeneListe.push({id:d.id,...d.data()}));

    render();
    renderOffene();
}

// ================= ADD =================
async function addArtikel() {

    const name = document.getElementById("name").value.trim();
    const kategorie = document.getElementById("kategorie").value;
    const groesse = document.getElementById("groesse").value.trim();
    const bestand = Number(document.getElementById("bestand").value);

    if(!name || !groesse || isNaN(bestand)) return;

    await addDoc(collection(db,"artikel"),{
        name,kategorie,groesse,bestand
    });

    document.getElementById("addForm").reset();
    load();
}

// ================= RENDER =================
function render() {

    const c = document.getElementById("gruppenContainer");
    c.innerHTML="";

    artikelListe.forEach(a=>{

        const div=document.createElement("div");
        div.className="gruppe";

        div.innerHTML=`
            ${a.name} (${a.kategorie}) - ${a.groesse}
            <br> Bestand: ${a.bestand}
            <br>
            <button onclick="plus('${a.id}')">+1</button>
            <button onclick="minus('${a.id}')">-1</button>
            <button onclick="del('${a.id}')">Löschen</button>
        `;

        c.appendChild(div);
    });
}

// ================= OFFENE =================
function renderOffene() {

    const c=document.getElementById("offeneListe");
    c.innerHTML="";

    offeneListe.forEach(o=>{

        const div=document.createElement("div");

        div.innerHTML=`
            <b>${o.name}</b> - ${o.artikel}
            (${o.groesse}) | ${o.betrag}€
        `;

        c.appendChild(div);
    });
}

// ================= ACTIONS =================
window.plus = async id => {

    const a = artikelListe.find(x=>x.id===id);

    await updateDoc(doc(db,"artikel",id),{
        bestand:a.bestand+1
    });

    load();
};

window.minus = id => {
    selectedId = id;
    document.getElementById("popup").style.display="flex";
};

window.closePopup = () => {
    document.getElementById("popup").style.display="none";
};

savePay.onclick = async () => {

    const a = artikelListe.find(x=>x.id===selectedId);

    await updateDoc(doc(db,"artikel",selectedId),{
        bestand:a.bestand-1
    });

    await addDoc(collection(db,"offene"),{
        name:popupName.value,
        betrag:popupBetrag.value,
        artikel:a.name,
        groesse:a.groesse
    });

    closePopup();
    load();
};

window.del = async id => {

    await deleteDoc(doc(db,"artikel",id));
    load();
};

document.getElementById("addForm").addEventListener("submit",e=>{
    e.preventDefault();
    addArtikel();
});

reset.onclick = async () => {

    const a = await getDocs(collection(db,"artikel"));
    a.forEach(async d=>await deleteDoc(doc(db,"artikel",d.id)));

    const o = await getDocs(collection(db,"offene"));
    o.forEach(async d=>await deleteDoc(doc(db,"offene",d.id)));

    load();
};

load();

</script>

</body>
</html>
