<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Landjugend Herxheim – Kleiderverwaltung</title>

<style>
/* ===== DEIN DESIGN BLEIBT KOMPLETT GLEICH ===== */
:root {
    --blau: #0077cc;
    --gruen: #3cb043;
    --rot: #dc3545;
    --weiss: #ffffff;
    --hellgrau: #f5f5f5;
}

body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: var(--hellgrau);
}

#passwortOverlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#passwortBox {
    background: white;
    padding: 25px;
    border-radius: 10px;
    width: 90%;
    max-width: 350px;
    text-align: center;
}

#passwortBox input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
}

#passwortBox button {
    margin-top: 15px;
    padding: 10px 20px;
    background: var(--blau);
    color: white;
    border: none;
    border-radius: 5px;
}

header {
    background: linear-gradient(90deg, var(--blau), var(--gruen));
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    max-width: 900px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

h2 {
    border-left: 6px solid var(--gruen);
    padding-left: 10px;
}

form {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 20px;
}

input, select {
    padding: 6px;
    width: 100%;
}

button.primary { background: var(--blau); color: white; border: none; padding: 7px 12px; border-radius: 4px; }
button.secondary { background: var(--gruen); color: white; border: none; padding: 7px 12px; border-radius: 4px; }
button.danger { background: var(--rot); color: white; border: none; padding: 7px 12px; border-radius: 4px; }
button.small { padding: 6px 10px; font-size: 0.8rem; }

.gruppe {
    background: #e9f5ff;
    padding: 12px;
    border-radius: 6px;
    margin-bottom: 10px;
    cursor: pointer;
    font-weight: bold;
}

.untergruppe {
    margin-left: 20px;
    margin-bottom: 20px;
    display: none;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th {
    background: var(--blau);
    color: white;
    padding: 8px;
}

td {
    padding: 6px;
    border: 1px solid #ddd;
}

.low-stock { background: #fff3cd; }

#popup {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    display: none;
    justify-content: center;
    align-items: center;
}

#popupContent {
    background: white;
    padding: 20px;
    border-radius: 8px;
    width: 90%;
    max-width: 350px;
}
</style>
</head>

<body>

<!-- Passwort -->
<div id="passwortOverlay">
    <div id="passwortBox">
        <h2>Passwort eingeben</h2>
        <input type="password" id="pwInput">
        <button onclick="checkPasswort()">Weiter</button>
        <p id="pwFehler" style="color:red; display:none;">Falsches Passwort</p>
    </div>
</div>

<script>
const PASSWORT = "LJH1950";
function checkPasswort() {
    if (document.getElementById("pwInput").value === PASSWORT) {
        document.getElementById("passwortOverlay").style.display = "none";
    } else {
        document.getElementById("pwFehler").style.display = "block";
    }
}
</script>

<header>
<h1>Landjugend Herxheim – Kleiderverwaltung</h1>
</header>

<div class="container">

<h2>Neuen Artikel hinzufügen</h2>
<form id="addForm">
    <input type="text" id="name" placeholder="Artikelname" required>
    <select id="kategorie">
        <option>Damen</option>
        <option>Herren</option>
        <option>Unisex</option>
        <option>Kinder</option>
    </select>
    <input type="text" id="groesse" placeholder="Größe" required>
    <input type="number" id="bestand" min="0" value="0" required>
    <button class="primary" type="submit">Hinzufügen</button>
</form>

<h2>Bestand</h2>
<div id="gruppenContainer"></div>

<h2>Offene Zahlungen</h2>
<div id="offeneListe"></div>

<button id="resetAll" class="danger">Alle Daten löschen</button>
</div>

<!-- Popup -->
<div id="popup">
<div id="popupContent">
    <h3>Offene Zahlung erfassen</h3>
    <input type="text" id="popupName" placeholder="Name">
    <input type="number" id="popupBetrag" step="0.01" placeholder="Betrag (€)">
    <button id="popupSave" class="primary">Speichern</button>
    <button id="popupCancel" class="secondary">Abbrechen</button>
</div>
</div>

<!-- ================= FIREBASE ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    deleteDoc,
    doc,
    updateDoc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCD0Pz2LpOdFQ6-UrlNCuHQ5sqW87SgsDs",
    authDomain: "ljh-kleider.firebaseapp.com",
    projectId: "ljh-kleider",
    storageBucket: "ljh-kleider.firebasestorage.app",
    messagingSenderId: "76446271591",
    appId: "1:76446271591:web:ecd096fa6c9afa570fecc2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let artikelListe = [];
let offeneZahlungen = [];
let aktuellerArtikelID = null;

// ===== LADEN =====
async function ladeDaten() {

    artikelListe = [];
    offeneZahlungen = [];

    const aSnap = await getDocs(collection(db, "artikel"));
    aSnap.forEach(d => artikelListe.push({ firestoreId: d.id, ...d.data() }));

    const oSnap = await getDocs(collection(db, "offeneZahlungen"));
    oSnap.forEach(d => offeneZahlungen.push({ firestoreId: d.id, ...d.data() }));

    renderGruppen();
    renderOffene();
}

// ===== GRUPPIEREN =====
function gruppiereArtikel() {
    const g = {};
    artikelListe.forEach(a => {
        const key = a.name + "___" + a.kategorie;
        if (!g[key]) g[key] = [];
        g[key].push(a);
    });
    return g;
}

// ===== RENDER ARTIKEL =====
function renderGruppen() {
    const container = document.getElementById("gruppenContainer");
    container.innerHTML = "";

    const gruppen = gruppiereArtikel();

    Object.keys(gruppen).forEach(key => {
        const [name, kategorie] = key.split("___");

        const div = document.createElement("div");
        div.className = "gruppe";
        div.textContent = `${name} (${kategorie})`;

        const unter = document.createElement("div");
        unter.className = "untergruppe";

        const table = document.createElement("table");
        table.innerHTML = `
            <tr><th>Größe</th><th>Bestand</th><th>Aktionen</th></tr>
        `;

        gruppen[key].forEach(a => {
            const tr = document.createElement("tr");
            if (a.bestand <= 3) tr.classList.add("low-stock");

            tr.innerHTML = `
                <td>${a.groesse}</td>
                <td>${a.bestand}</td>
                <td>
                    <button class="small primary" onclick="plus('${a.firestoreId}')">+1</button>
                    <button class="small secondary" onclick="minus('${a.firestoreId}')">-1</button>
                    <button class="small danger" onclick="delArtikel('${a.firestoreId}')">Löschen</button>
                </td>
            `;
            table.appendChild(tr);
        });

        unter.appendChild(table);

        div.onclick = () => {
            unter.style.display = unter.style.display === "block" ? "none" : "block";
        };

        container.appendChild(div);
        container.appendChild(unter);
    });
}

// ===== OFFENE ZAHLUNGEN =====
function renderOffene() {
    const div = document.getElementById("offeneListe");
    div.innerHTML = "";

    offeneZahlungen.forEach(o => {
        const d = document.createElement("div");
        d.style.padding = "10px";
        d.style.borderBottom = "1px solid #ccc";

        d.innerHTML = `
            <strong>${o.name}</strong> – ${o.artikel} (${o.groesse})<br>
            Betrag: <strong>${o.betrag} €</strong><br>
            <button class="secondary small" onclick="bezahlt('${o.firestoreId}')">Als bezahlt</button>
        `;
        div.appendChild(d);
    });
}

// ===== ADD =====
async function addArtikel() {
    await addDoc(collection(db, "artikel"), {
        name: name.value,
        kategorie: kategorie.value,
        groesse: groesse.value,
        bestand: parseInt(bestand.value)
    });
    ladeDaten();
}

document.getElementById("addForm").addEventListener("submit", e => {
    e.preventDefault();
    addArtikel();
    e.target.reset();
});

// ===== ACTIONS =====
window.plus = async id => {
    const a = artikelListe.find(x => x.firestoreId === id);
    await updateDoc(doc(db, "artikel", id), { bestand: a.bestand + 1 });
    ladeDaten();
};

window.minus = id => {
    aktuellerArtikelID = id;
    popup.style.display = "flex";
};

popupSave.onclick = async () => {
    const a = artikelListe.find(x => x.firestoreId === aktuellerArtikelID);

    await updateDoc(doc(db, "artikel", aktuellerArtikelID), {
        bestand: a.bestand - 1
    });

    await addDoc(collection(db, "offeneZahlungen"), {
        name: popupName.value,
        betrag: popupBetrag.value,
        artikel: a.name,
        groesse: a.groesse
    });

    popup.style.display = "none";
    ladeDaten();
};

popupCancel.onclick = () => popup.style.display = "none";

window.bezahlt = async id => {
    await deleteDoc(doc(db, "offeneZahlungen", id));
    ladeDaten();
};

window.delArtikel = async id => {
    await deleteDoc(doc(db, "artikel", id));
    ladeDaten();
};

document.getElementById("resetAll").onclick = async () => {
    if (!confirm("Wirklich alles löschen?")) return;

    for (let a of artikelListe)
        await deleteDoc(doc(db, "artikel", a.firestoreId));

    for (let o of offeneZahlungen)
        await deleteDoc(doc(db, "offeneZahlungen", o.firestoreId));

    ladeDaten();
};

// START
ladeDaten();

</script>

</body>
</html>
