<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Kleiderverwaltung LJH</title>

<style>
body {font-family: Arial; margin:0; background:#f5f5f5;}
header {background:linear-gradient(90deg,#0077cc,#3cb043); color:white; padding:20px; text-align:center;}

.container {max-width:900px; margin:20px auto; background:white; padding:20px; border-radius:10px;}

button {padding:6px 10px; border:none; cursor:pointer;}
.primary {background:#0077cc; color:white;}
.secondary {background:#3cb043; color:white;}
.danger {background:#dc3545; color:white;}

.card {background:#e9f5ff; padding:10px; margin-top:10px; border-radius:8px; cursor:pointer;}
.item {background:white; border:1px solid #ddd; margin-top:5px; padding:6px;}

#popup,#payPopup{
position:fixed; top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.box {background:white; padding:20px; border-radius:8px; width:300px;}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="lock">
<div class="box">
<h2>Passwort</h2>
<input id="pw" type="password">
<button onclick="check()">Enter</button>
<p id="err" style="color:red; display:none;">Falsch</p>
</div>
</div>

<header>
<h1>Kleiderverwaltung</h1>
</header>

<div class="container">

<h2 id="title">Kategorien</h2>
<div id="list"></div>

<h2>Offene Rechnungen</h2>
<div id="open"></div>

</div>

<!-- PAYMENT POPUP -->
<div id="payPopup">
<div class="box">
<h3>Verkauf erfassen</h3>

<p>Bezahlt direkt?</p>
<button onclick="directPay(true)">Ja</button>
<button onclick="directPay(false)">Nein</button>

<div id="details" style="display:none;">
<input id="buyer" placeholder="Name">
<input id="amount" placeholder="Betrag">
<button onclick="saveDebt()">Speichern</button>
</div>

<button onclick="closePay()">Abbrechen</button>
</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
updateDoc,
deleteDoc,
doc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
apiKey:"AIzaSyCD0Pz2LpOdFQ6-UrlNCuHQ5sqW87SgsDs",
authDomain:"ljh-kleider.firebaseapp.com",
projectId:"ljh-kleider",
storageBucket:"ljh-kleider.firebasestorage.app",
messagingSenderId:"76446271591",
appId:"1:76446271591:web:ecd096fa6c9afa570fecc2"
};

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);

let step=0;
let currentCat="";
let currentSub="";
let data=[];
let open=[];
let current=null;

/* ================= LOGIN ================= */
window.check=()=>{
if(pw.value==="LJH1950"){
document.getElementById("lock").style.display="none";
load();
}else{
err.style.display="block";
}
};

/* ================= LOAD ================= */
async function load(){

data=[];
open=[];

const a=await getDocs(collection(db,"artikel"));
a.forEach(d=>data.push({id:d.id,...d.data()}));

const o=await getDocs(collection(db,"offene"));
o.forEach(d=>open.push({id:d.id,...d.data()}));

render();
renderOpen();
}

/* ================= RENDER NAV ================= */
function render(){

const c=document.getElementById("list");
c.innerHTML="";

/* STEP 1: Kategorien */
if(step===0){

const cats=[...new Set(data.map(x=>x.name))];

cats.forEach(cat=>{
const d=document.createElement("div");
d.className="card";
d.innerHTML=cat;

d.onclick=()=>{
currentCat=cat;
step=1;
render();
};

c.appendChild(d);
});
}

/* STEP 2: Damen / Herren */
if(step===1){

document.getElementById("title").innerText=currentCat;

const subs=[...new Set(
data.filter(x=>x.name===currentCat).map(x=>x.kat)
)];

subs.forEach(sub=>{
const d=document.createElement("div");
d.className="card";
d.innerHTML=sub;

d.onclick=()=>{
currentSub=sub;
step=2;
render();
};

c.appendChild(d);
});
}

/* STEP 3: Größen */
if(step===2){

document.getElementById("title").innerText=currentCat+" → "+currentSub;

const items=data.filter(x=>
x.name===currentCat && x.kat===currentSub
);

items.forEach(a=>{
const d=document.createElement("div");
d.className="item";

d.innerHTML=`
<b>${a.size}</b> | Bestand: ${a.count}
<button onclick="plus('${a.id}')">+1</button>
<button onclick="minus('${a.id}')">-1</button>
`;

c.appendChild(d);
});
}
}

/* ================= BACK (optional) ================= */
document.addEventListener("keydown",e=>{
if(e.key==="Backspace"){
if(step>0){
step--;
render();
}
}
});

/* ================= PLUS ================= */
window.plus=async id=>{
const a=data.find(x=>x.id===id);
await updateDoc(doc(db,"artikel",id),{count:a.count+1});
load();
};

/* ================= MINUS ================= */
window.minus=id=>{
current=id;
document.getElementById("payPopup").style.display="flex";
document.getElementById("details").style.display="none";
};

/* ================= PAYMENT ================= */
window.directPay=(yes)=>{
if(yes){
finish();
}else{
document.getElementById("details").style.display="block";
}
};

window.saveDebt=async()=>{

const a=data.find(x=>x.id===current);

await addDoc(collection(db,"offene"),{
name:buyer.value,
betrag:amount.value,
artikel:a.name,
size:a.size
});

finish();
};

async function finish(){

const a=data.find(x=>x.id===current);

await updateDoc(doc(db,"artikel",current),{
count:a.count-1
});

closePay();
load();
}

/* ================= OPEN ================= */
function renderOpen(){

const c=document.getElementById("open");
c.innerHTML="";

open.forEach(o=>{

const d=document.createElement("div");
d.className="item";

d.innerHTML=`
<b>${o.name}</b> - ${o.artikel} (${o.size})<br>
${o.betrag} €<br>

<button class="secondary" onclick="markPaid('${o.id}')">Bezahlt</button>
<button class="danger" onclick="deleteDebt('${o.id}')">Löschen</button>
`;

c.appendChild(d);
});
}

/* ================= DELETE ================= */
window.markPaid=async(id)=>{
await deleteDoc(doc(db,"offene",id));
load();
};

window.deleteDebt=async(id)=>{
await deleteDoc(doc(db,"offene",id));
load();
};

window.closePay=()=>{
document.getElementById("payPopup").style.display="none";
};

load();

</script>

</body>
</html>
