<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Landjugend Herxheim – Kleiderverwaltung</title>

<style>
:root {
    --blau: #0077cc;
    --gruen: #3cb043;
    --rot: #dc3545;
    --hellgrau: #f5f5f5;
}

body {
    font-family: Arial, sans-serif;
    margin: 0;
    background: var(--hellgrau);
}

/* Passwort */
#passwortOverlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 9999;
}

#passwortBox {
    background: white;
    padding: 25px;
    border-radius: 10px;
    width: 90%;
    max-width: 350px;
    text-align: center;
}

header {
    background: linear-gradient(90deg, var(--blau), var(--gruen));
    color: white;
    padding: 20px;
    text-align: center;
}

.container {
    max-width: 900px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
}

form {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

input, select {
    padding: 6px;
}

button.primary { background: var(--blau); color: white; border: none; padding: 7px 12px; }
button.secondary { background: var(--gruen); color: white; border: none; padding: 7px 12px; }
button.danger { background: var(--rot); color: white; border: none; padding: 7px 12px; }

.gruppe {
    background: #e9f5ff;
    padding: 12px;
    margin-bottom: 10px;
    cursor: pointer;
    font-weight: bold;
}

.untergruppe {
    display: none;
    margin-left: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    background: var(--blau);
    color: white;
}

td {
    border: 1px solid #ddd;
    padding: 6px;
}

.low-stock {
    background: #fff3cd;
}

#popup {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.5);
    display: none;
    justify-content: center;
    align-items: center;
}

#popupContent {
    background: white;
    padding: 20px;
    border-radius: 8px;
}
</style>
</head>

<body>

<!-- Passwort -->
<div id="passwortOverlay">
    <div id="passwortBox">
        <h2>Passwort</h2>
        <input type="password" id="pwInput">
        <button onclick="checkPasswort()">Weiter</button>
    </div>
</div>

<script>
const PASSWORT = "LJH1950";
function checkPasswort() {
    if (document.getElementById("pwInput").value === PASSWORT) {
        document.getElementById("passwortOverlay").style.display = "none";
    }
}
</script>

<header>
<h1>Kleiderverwaltung</h1>
</header>

<div class="container">

<h2>Artikel hinzufügen</h2>

<form id="addForm">
    <input type="text" id="name" placeholder="Name" required>
    <select id="kategorie">
        <option>Damen</option>
        <option>Herren</option>
        <option>Unisex</option>
        <option>Kinder</option>
    </select>
    <input type="text" id="groesse" placeholder="Größe" required>
    <input type="number" id="bestand" placeholder="Bestand" required>
    <button class="primary" type="submit">Hinzufügen</button>
</form>

<h2>Bestand</h2>
<div id="gruppenContainer"></div>

<h2>Offene Zahlungen</h2>
<div id="offeneListe"></div>

<button id="resetAll" class="danger">Alle löschen</button>

</div>

<!-- Popup -->
<div id="popup">
<div id="popupContent">
    <input type="text" id="popupName" placeholder="Name">
    <input type="number" id="popupBetrag" placeholder="Betrag">
    <button id="popupSave">Speichern</button>
    <button id="popupCancel">Abbrechen</button>
</div>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    updateDoc,
    deleteDoc,
    doc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCD0Pz2LpOdFQ6-UrlNCuHQ5sqW87SgsDs",
    authDomain: "ljh-kleider.firebaseapp.com",
    projectId: "ljh-kleider",
    storageBucket: "ljh-kleider.firebasestorage.app",
    messagingSenderId: "76446271591",
    appId: "1:76446271591:web:ecd096fa6c9afa570fecc2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let artikelListe = [];
let offeneZahlungen = [];
let aktuellerArtikelID = null;

// 🔥 FIX: Daten korrekt aus Inputs holen
async function addArtikel() {

    const name = document.getElementById("name").value;
    const kategorie = document.getElementById("kategorie").value;
    const groesse = document.getElementById("groesse").value;
    const bestand = document.getElementById("bestand").value;

    await addDoc(collection(db, "artikel"), {
        name: name,
        kategorie: kategorie,
        groesse: groesse,
        bestand: parseInt(bestand)
    });

    ladeDaten();
}

// Laden
async function ladeDaten() {

    artikelListe = [];
    offeneZahlungen = [];

    const aSnap = await getDocs(collection(db, "artikel"));
    aSnap.forEach(d => artikelListe.push({ id: d.id, ...d.data() }));

    const oSnap = await getDocs(collection(db, "offeneZahlungen"));
    oSnap.forEach(d => offeneZahlungen.push({ id: d.id, ...d.data() }));

    render();
}

// Render
function render() {

    const c = document.getElementById("gruppenContainer");
    c.innerHTML = "";

    artikelListe.forEach(a => {

        const div = document.createElement("div");
        div.className = "gruppe";
        div.innerHTML = `${a.name} (${a.kategorie}) - ${a.groesse} | Bestand: ${a.bestand}`;

        div.onclick = () => {
            alert("Funktion bleibt gleich, kannst du später erweitern");
        };

        c.appendChild(div);
    });
}

// Submit
document.getElementById("addForm").addEventListener("submit", e => {
    e.preventDefault();
    addArtikel();
    e.target.reset();
});

// Start
ladeDaten();

</script>

</body>
</html>
