<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Kleiderverwaltung</title>

<style>
:root {
    --blau:#0077cc;
    --gruen:#3cb043;
    --rot:#dc3545;
    --hell:#f5f5f5;
}

body {
    font-family: Arial;
    margin: 0;
    background: var(--hell);
}

header {
    background: linear-gradient(90deg,var(--blau),var(--gruen));
    color:white;
    padding:20px;
    text-align:center;
}

.container {
    max-width:900px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

form {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

input,select {
    padding:6px;
}

button {
    padding:6px 10px;
    border:none;
    cursor:pointer;
}

.primary { background:var(--blau); color:white; }
.secondary { background:var(--gruen); color:white; }
.danger { background:var(--rot); color:white; }

.group {
    background:#e9f5ff;
    margin-top:10px;
    padding:10px;
    border-radius:6px;
    font-weight:bold;
}

.item {
    margin-left:15px;
    margin-top:5px;
    padding:5px;
    background:white;
    border:1px solid #ddd;
    border-radius:5px;
}
</style>
</head>

<body>

<header>
<h1>Kleiderverwaltung</h1>
</header>

<div class="container">

<h2>Artikel hinzufügen</h2>

<form id="addForm">
    <input id="name" placeholder="Name">
    <select id="kategorie">
        <option>Damen</option>
        <option>Herren</option>
        <option>Unisex</option>
        <option>Kinder</option>
    </select>
    <input id="groesse" placeholder="Größe (S/M/L)">
    <input id="bestand" type="number" placeholder="Bestand">
    <button class="primary">Hinzufügen</button>
</form>

<h2>Bestand</h2>
<div id="container"></div>

</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs,
    updateDoc,
    deleteDoc,
    doc
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCD0Pz2LpOdFQ6-UrlNCuHQ5sqW87SgsDs",
    authDomain: "ljh-kleider.firebaseapp.com",
    projectId: "ljh-kleider",
    storageBucket: "ljh-kleider.firebasestorage.app",
    messagingSenderId: "76446271591",
    appId: "1:76446271591:web:ecd096fa6c9afa570fecc2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let data = [];

// ================= ADD =================
async function addArtikel() {

    const name = document.getElementById("name").value.trim();
    const kategorie = document.getElementById("kategorie").value;
    const groesse = document.getElementById("groesse").value.trim();
    const bestand = Number(document.getElementById("bestand").value);

    if(!name || !groesse || isNaN(bestand)) return;

    await addDoc(collection(db,"artikel"),{
        name,
        kategorie,
        groesse,
        bestand
    });

    document.getElementById("addForm").reset();
    load();
}

// ================= LOAD =================
async function load() {

    data = [];

    const snap = await getDocs(collection(db,"artikel"));

    snap.forEach(d=>{
        data.push({id:d.id,...d.data()});
    });

    render();
}

// ================= GROUP =================
function group() {

    const g = {};

    data.forEach(a=>{
        const key = a.name + "___" + a.kategorie;
        if(!g[key]) g[key]=[];
        g[key].push(a);
    });

    return g;
}

// ================= RENDER =================
function render() {

    const c = document.getElementById("container");
    c.innerHTML = "";

    const groups = group();

    Object.keys(groups).forEach(key=>{

        const [name,kat] = key.split("___");

        const box = document.createElement("div");
        box.className="group";
        box.innerHTML=`${name} (${kat})`;

        groups[key].forEach(a=>{

            const item = document.createElement("div");
            item.className="item";

            item.innerHTML=`
                Größe: <b>${a.groesse}</b>
                | Bestand: <b>${a.bestand}</b>

                <button onclick="plus('${a.id}')">+1</button>
                <button onclick="minus('${a.id}')">-1</button>
                <button onclick="del('${a.id}')">Löschen</button>
            `;

            box.appendChild(item);
        });

        c.appendChild(box);
    });
}

// ================= ACTIONS =================
window.plus = async id => {

    const a = data.find(x=>x.id===id);

    await updateDoc(doc(db,"artikel",id),{
        bestand:a.bestand+1
    });

    load();
};

window.minus = async id => {

    const a = data.find(x=>x.id===id);

    await updateDoc(doc(db,"artikel",id),{
        bestand:a.bestand-1
    });

    load();
};

window.del = async id => {

    await deleteDoc(doc(db,"artikel",id));

    load();
};

// ================= FORM =================
document.getElementById("addForm").addEventListener("submit",e=>{
    e.preventDefault();
    addArtikel();
});

// ================= START =================
load();

</script>

</body>
</html>
