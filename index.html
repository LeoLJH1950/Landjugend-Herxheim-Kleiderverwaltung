<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Kleiderverwaltung</title>

<style>
:root {
    --blau:#0077cc;
    --gruen:#3cb043;
    --rot:#dc3545;
    --hell:#f5f5f5;
}

body {
    font-family: Arial;
    margin: 0;
    background: var(--hell);
}

header {
    background: linear-gradient(90deg,var(--blau),var(--gruen));
    color:white;
    padding:20px;
    text-align:center;
}

.container {
    max-width:900px;
    margin:20px auto;
    background:white;
    padding:20px;
    border-radius:10px;
}

form {
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

input,select {
    padding:6px;
}

button {
    padding:7px 12px;
    border:none;
    cursor:pointer;
}

.primary { background:var(--blau); color:white; }
.secondary { background:var(--gruen); color:white; }
.danger { background:var(--rot); color:white; }

.gruppe {
    background:#e9f5ff;
    padding:10px;
    margin-top:10px;
    cursor:pointer;
}

table {
    width:100%;
    margin-top:10px;
    border-collapse:collapse;
}

th {
    background:var(--blau);
    color:white;
}

td {
    border:1px solid #ddd;
    padding:6px;
}
</style>
</head>

<body>

<header>
<h1>Kleiderverwaltung</h1>
</header>

<div class="container">

<h2>Artikel hinzufügen</h2>

<form id="addForm">
    <input id="name" placeholder="Name">
    <select id="kategorie">
        <option>Damen</option>
        <option>Herren</option>
        <option>Unisex</option>
        <option>Kinder</option>
    </select>
    <input id="groesse" placeholder="Größe">
    <input id="bestand" type="number" placeholder="Bestand">
    <button class="primary" type="submit">Hinzufügen</button>
</form>

<h2>Bestand</h2>
<div id="gruppenContainer"></div>

</div>

<!-- ================= FIREBASE ================= -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
import {
    getFirestore,
    collection,
    addDoc,
    getDocs
} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyCD0Pz2LpOdFQ6-UrlNCuHQ5sqW87SgsDs",
    authDomain: "ljh-kleider.firebaseapp.com",
    projectId: "ljh-kleider",
    storageBucket: "ljh-kleider.firebasestorage.app",
    messagingSenderId: "76446271591",
    appId: "1:76446271591:web:ecd096fa6c9afa570fecc2"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let artikelListe = [];

// ===== ADD ARTIKEL (100% FIXED) =====
async function addArtikel() {

    const name = document.getElementById("name").value.trim();
    const kategorie = document.getElementById("kategorie").value;
    const groesse = document.getElementById("groesse").value.trim();
    const bestand = Number(document.getElementById("bestand").value);

    if (!name || !groesse || isNaN(bestand)) {
        alert("Bitte alles ausfüllen!");
        return;
    }

    await addDoc(collection(db, "artikel"), {
        name,
        kategorie,
        groesse,
        bestand
    });

    document.getElementById("addForm").reset();
    ladeDaten();
}

// ===== LOAD =====
async function ladeDaten() {

    artikelListe = [];

    const snap = await getDocs(collection(db, "artikel"));

    snap.forEach(d => {
        artikelListe.push({ id: d.id, ...d.data() });
    });

    render();
}

// ===== RENDER =====
function render() {

    const c = document.getElementById("gruppenContainer");
    c.innerHTML = "";

    artikelListe.forEach(a => {

        const div = document.createElement("div");
        div.className = "gruppe";

        div.innerHTML = `
            <b>${a.name}</b> (${a.kategorie})<br>
            Größe: ${a.groesse} | Bestand: ${a.bestand}
        `;

        c.appendChild(div);
    });
}

// ===== FORM =====
document.getElementById("addForm").addEventListener("submit", e => {
    e.preventDefault();
    addArtikel();
});

// ===== START =====
ladeDaten();

</script>

</body>
</html>
